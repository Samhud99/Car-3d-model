services:

  # ----------------------------------------------------------
  # OpenClaw Gateway
  # ----------------------------------------------------------
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    container_name: car3d-openclaw-gateway
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var/tmp:size=128m
      - /run:size=64m
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./workspace:/home/node/.openclaw/workspace
      - ./skills:/home/node/.openclaw/skills:ro
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - NODE_ENV=production
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - HTTPS_PROXY=http://egress-proxy:3128
      - HTTP_PROXY=http://egress-proxy:3128
      - NO_PROXY=localhost,127.0.0.1
    networks:
      - openclaw-internal
    depends_on:
      - egress-proxy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # OpenClaw CLI — management commands only
  # ----------------------------------------------------------
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    container_name: car3d-openclaw-cli
    profiles:
      - cli
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m
    volumes:
      - openclaw-data:/home/node/.openclaw
    networks:
      - openclaw-internal
    environment:
      - ZAI_API_KEY=placeholder

  # ----------------------------------------------------------
  # Egress Proxy — Squid with strict allowlist
  # ----------------------------------------------------------
  egress-proxy:
    image: ubuntu/squid:6.6-24.04_beta
    container_name: car3d-egress-proxy
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    tmpfs:
      - /var/spool/squid:size=512m,uid=13,gid=13
      - /var/log/squid:size=128m,uid=13,gid=13
      - /run:size=64m
      - /tmp:size=64m
    volumes:
      - ./security/squid.conf:/etc/squid/squid.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - openclaw-internal
      - internet-egress

  # ----------------------------------------------------------
  # Express Backend — serves React frontend + proxies to OpenClaw
  # ----------------------------------------------------------
  express-backend:
    build: ./backend
    container_name: car3d-express-backend
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./workspace:/workspace:ro
      - ./frontend/dist:/app/frontend/dist:ro
    environment:
      - NODE_ENV=production
      - CARS_JSON_PATH=/workspace/output/cars.json
      - OPENCLAW_URL=http://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - FRONTEND_TOKEN=${FRONTEND_TOKEN}
    networks:
      - openclaw-internal
      - frontend-bridge
    depends_on:
      - openclaw-gateway
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Car Scraper — on-demand
  # ----------------------------------------------------------
  car-scraper:
    build: ./scraper
    container_name: car3d-car-scraper
    profiles:
      - scraper
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512m
    volumes:
      - ./workspace:/workspace:z
    environment:
      - HTTPS_PROXY=http://egress-proxy:3128
      - HTTP_PROXY=http://egress-proxy:3128
      - NO_PROXY=localhost,127.0.0.1
    networks:
      - openclaw-internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  openclaw-data:
    name: car3d-openclaw-data

networks:
  openclaw-internal:
    name: car3d-openclaw-internal
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  internet-egress:
    name: car3d-internet-egress
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

  frontend-bridge:
    name: car3d-frontend-bridge
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
