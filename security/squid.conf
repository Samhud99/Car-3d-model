# ============================================================
# Squid Egress Proxy — Car Model Skill
# ============================================================
# ALLOWLIST ONLY. Everything not listed here is DENIED.
# OpenClaw routes all outbound HTTP/S through this proxy.
# ============================================================

# Basic squid settings
http_port 3128
pid_filename /run/squid.pid
coredump_dir /var/spool/squid

# Logging
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
cache_store_log none

# No disk cache — we don't want web content persisting
cache deny all
cache_mem 64 MB

# ============================================================
# ALLOWLIST — Approved egress domains
# ============================================================

# Z.ai API — required for GLM-5 model inference
acl allowed_zai dstdomain open.bigmodel.cn api.z.ai

# Anthropic API — required for Claude model inference
acl allowed_anthropic dstdomain api.anthropic.com

# Australian car manufacturer specification sites
acl allowed_manufacturers dstdomain \
    www.mazda.com.au \
    www.toyota.com.au \
    www.mitsubishi-motors.com.au \
    www.hyundai.com \
    www.kia.com \
    www.ford.com.au \
    www.holden.com.au \
    www.volkswagen.com.au \
    www.subaru.com.au \
    www.nissan.com.au \
    www.honda.com.au \
    www.jeep.com.au \
    www.mercedes-benz.com.au \
    www.bmw.com.au \
    www.audi.com.au \
    www.landrover.com.au

# Car research and specification databases
acl allowed_car_research dstdomain \
    www.carsguide.com.au \
    www.drive.com.au \
    www.redbook.com.au \
    www.carsales.com.au \
    www.caradvice.com.au \
    www.racv.com.au

# Wikipedia for vehicle specifications
acl allowed_wikipedia dstdomain en.wikipedia.org

# Combine all allowed destinations (must match individual ACLs above exactly)
acl allowed_destinations dstdomain \
    open.bigmodel.cn \
    api.z.ai \
    api.anthropic.com \
    www.mazda.com.au \
    www.toyota.com.au \
    www.mitsubishi-motors.com.au \
    www.hyundai.com \
    www.kia.com \
    www.ford.com.au \
    www.holden.com.au \
    www.volkswagen.com.au \
    www.subaru.com.au \
    www.nissan.com.au \
    www.honda.com.au \
    www.jeep.com.au \
    www.mercedes-benz.com.au \
    www.bmw.com.au \
    www.audi.com.au \
    www.landrover.com.au \
    www.carsguide.com.au \
    www.drive.com.au \
    www.redbook.com.au \
    www.carsales.com.au \
    www.caradvice.com.au \
    www.racv.com.au \
    en.wikipedia.org

# ============================================================
# RULES — Order matters. First match wins.
# ============================================================

# Internal network allowed to use proxy (must be defined before use)
acl localnet src 172.30.0.0/24

# ============================================================
# BLOCKED — Explicitly deny known data exfiltration endpoints
# These fire FIRST so they cannot be overridden by allowlist mistakes
# ============================================================
acl never_allow dstdomain \
    pastebin.com \
    .ngrok.io \
    requestbin.com \
    webhook.site

http_access deny never_allow

# Allow CONNECT (HTTPS tunnelling) to allowed destinations only
acl CONNECT method CONNECT
http_access allow CONNECT allowed_destinations

# Allow HTTP to allowed destinations from internal network
http_access allow localnet allowed_destinations

# DENY EVERYTHING ELSE — this is the critical line
http_access deny all
